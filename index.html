<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>遊戲算分器</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <h1>遊戲算分器</h1>
    <p id="sync-status" class="sync-status sync-status-disconnected">
      同步：本機模式
    </p>

    <section class="round-settings">
      <label>
        左隊家名
        <select id="left-house-select"></select>
      </label>

      <label>
        右隊家名
        <select id="right-house-select"></select>
      </label>

      <button id="update-round-button">更新本輪</button>
    </section>

    <section class="matchup-info" aria-live="polite">
      <p id="current-round">第一輪</p>
      <p id="current-matchup">一家 VS 二家</p>
    </section>

    <section id="scoreboard-section" class="scoreboard">
      <div class="team-card">
        <h2 id="team-a-title">A 隊</h2>
        <p id="score-a">0</p>
      </div>

      <div class="team-card">
        <h2 id="team-b-title">B 隊</h2>
        <p id="score-b">0</p>
      </div>
    </section>

    <section id="building-section" class="game-card">
      <h2>盲眼建築師</h2>

      <label class="building-stage-control">
        建築階段
        <select id="building-stage-select">
          <option value="1">第一輪建築（6 個積木）</option>
          <option value="2">第二輪建築（12 個積木）</option>
        </select>
      </label>

      <label class="building-stage-control">
        評分家名
        <select id="building-team-select"></select>
      </label>

      <p id="building-current-target" class="building-current-target">
        目前評分：A 隊 第一輪建築
      </p>

      <div id="building-block-list" class="building-block-list"></div>

      <div class="building-summary">
        <p>形狀分：<span id="building-shape-score">0</span> 分</p>
        <p>位置分：<span id="building-position-score">0</span> 分</p>
        <p>
          本次合計：
          <span id="building-total-score">0</span> /
          <span id="building-max-score">12</span> 分
        </p>
      </div>

      <div class="building-submit-buttons">
        <button id="building-submit-current">送出本次建築分數</button>
      </div>
    </section>

    <section id="question-section" class="game-card">
      <h2>魔法球</h2>

      <p id="question-info" class="question-info">
        第 <span id="question-number">1</span> 題
      </p>

      <p class="question-score">
        本題 <span id="question-score">10</span> 分
      </p>

      <div class="answer-buttons">
        <button id="button-a">A 隊答對</button>

        <button id="button-none" class="secondary">
          無人答對
        </button>

        <button id="button-b">B 隊答對</button>
      </div>
    </section>

    <section id="round-controls-section" class="controls">
      <button id="undo-button" class="secondary">
        撤銷上一步
      </button>

      <button id="end-round-button" class="secondary">
        提前結束本輪
      </button>

      <button id="reset-button" class="danger">
        重置本輪
      </button>
    </section>

    <section class="history-controls">
      <button id="clear-history-button" class="secondary">
        清空歷史紀錄
      </button>
    </section>

    <section id="history-section" class="game-card">
      <h2>操作紀錄</h2>
      <ul id="history-list"></ul>
    </section>

    <section class="game-card">
      <h2>輪次紀錄</h2>
      <ul id="round-record-list"></ul>
    </section>
  </main>

  <script src="script.js?v=12"></script>
</body>
</html>
